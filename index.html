function save(){localStorage.setItem("wfdb_final", JSON.stringify(db))}

function status(p){
 let n=p.need||0, h=p.have||0
 if(h<n) return ["NEED","need"]
 if(h>n) return ["EXTRA","extra"]
 return ["COVERED","covered"]
}

function search(){
 let q=document.getElementById("q").value.toLowerCase()
 if(!q){document.getElementById("out").innerHTML="";return}

 let best=null

 db.forEach(item=>{
  Object.entries(item.parts).forEach(([part,data])=>{
    let label=(item.name+" "+part).toLowerCase()
    if(label.includes(q)){
      if(!best) best={item,part,data}
    }
  })
 })

 let exact = db.some(x=>x.name.toLowerCase()===q)

 if(best){
  let s=status(best.data)
  document.getElementById("out").innerHTML=`
  <div class="box">
   <b>${best.item.name} ${best.part}</b><br>
   <span class="${s[1]}">${s[0]}</span><br>
   Have ${best.data.have} / Need ${best.data.need}<br>
   <button onclick="inc()">+1 Have</button>
  </div>
  ` + (!exact ? `<button onclick="add()">Add "${q}"</button>` : "")
 } else {
  document.getElementById("out").innerHTML=`<button onclick="add()">Add "${q}"</button>`
 }
}

function inc(){
 let q=document.getElementById("q").value.toLowerCase()
 db.forEach(item=>{
  Object.entries(item.parts).forEach(([part,data])=>{
    let label=(item.name+" "+part).toLowerCase()
    if(label.includes(q)) data.have++
  })
 })
 save()
 search()
}

function add(){
 let name=document.getElementById("q").value
 db.push({name:name,parts:{Blueprint:{need:1,have:0}}})
 save()
 alert("Added "+name)
}
