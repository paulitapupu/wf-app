<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF App Reset</title>
<style>
body{background:#020617;color:white;font-family:Arial;padding:12px}
input{width:100%;padding:14px;font-size:18px;background:#000;color:white;border:1px solid #333;border-radius:8px}
button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold}
.item{padding:10px;border-bottom:1px solid #333}
.need{color:#22c55e}.extra{color:#ef4444}.covered{color:#60a5fa}.unknown{color:#f59e0b}
.box{background:#000;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>
<body>

<h2>Reward Picker</h2>

<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>

<input id="search" placeholder="type reward..." oninput="search()">

<div id="results"></div>
<div id="confirm"></div>
<div id="add"></div>

<script>
let db = JSON.parse(localStorage.getItem("wf_db")||"[]")

function save(){localStorage.setItem("wf_db",JSON.stringify(db))}

function status(p){
 if(!p.need) return "UNKNOWN"
 if(p.have<p.need) return "NEED"
 if(p.have>p.need) return "EXTRA"
 return "COVERED"
}

function search(){
 let q=document.getElementById("search").value.toLowerCase()
 let out=""
 let matches=[]

 db.forEach((item,i)=>{
  Object.keys(item.parts).forEach(part=>{
   let name=item.name+" "+part
   if(name.toLowerCase().includes(q)){
    matches.push({i,part,name})
   }
  })
 })

 if(matches.length){
  matches.forEach(m=>{
   let p=db[m.i].parts[m.part]
   let s=status(p)
   out+=`<div class="item"><b>${m.name}</b> <span class="${s.toLowerCase()}">${s}</span>
   <button onclick="pick(${m.i},'${m.part}','${m.name}')">Check</button></div>`
  })
 } else if(q){
  out+=`<div class="box">No match found
  <button onclick="startAdd('${q}')">Add new item</button></div>`
 }

 document.getElementById("results").innerHTML=out
}

let current=null

function pick(i,p,n){
 current={i,p,n}
 document.getElementById("confirm").innerHTML=
 `<div class="box"><b>${n}</b>
 <button onclick="confirmPick()">Choose this reward</button>
 <button onclick="cancel()">Not chosen</button></div>`
}

function confirmPick(){
 db[current.i].parts[current.p].have++
 save()
 cancel()
 search()
}

function cancel(){document.getElementById("confirm").innerHTML=""}

function startAdd(q){
 document.getElementById("add").innerHTML=
 `<div class="box">
 Name<input id="name" value="${q}">
 <button onclick="addPart()">Add part</button>
 <div id="parts"></div>
 <button onclick="saveItem()">Save item</button>
 </div>`
 window.parts=[]
}

function addPart(){
 parts.push({name:"",need:1,have:0,ducats:0})
 renderParts()
}

function renderParts(){
 let html=""
 parts.forEach((p,i)=>{
  html+=`
  <div>
   Part<input value="${p.name}" onchange="parts[${i}].name=this.value">
   Need<input type="number" value="${p.need}" onchange="parts[${i}].need=this.value">
   Have<input type="number" value="${p.have}" onchange="parts[${i}].have=this.value">
   Ducats<input type="number" value="${p.ducats}" onchange="parts[${i}].ducats=this.value">
  </div>`
 })
 document.getElementById("parts").innerHTML=html
}

function saveItem(){
 let name=document.getElementById("name").value
 let item={name,parts:{}}
 parts.forEach(p=>{
  if(p.name){
   item.parts[p.name]={need:+p.need||0,have:+p.have||0,ducats:+p.ducats||0}
  }
 })
 db.push(item)
 save()
 document.getElementById("add").innerHTML=""
 alert("Saved")
 search()
}

function exportData(){
 let blob=new Blob([JSON.stringify(db)],{type:"application/json"})
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="wf.json"
 a.click()
}

function importData(){
 let i=document.createElement("input")
 i.type="file"
 i.onchange=e=>{
  let r=new FileReader()
  r.onload=()=>{db=JSON.parse(r.result);save();alert("Imported")}
  r.readAsText(e.target.files[0])
 }
 i.click()
}
</script>

</body>
</html>
