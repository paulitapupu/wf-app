<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warframe Reward Picker</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  padding:12px;
}
input {
  width:100%;
  padding:16px;
  font-size:20px;
  border-radius:10px;
  border:1px solid #333;
  background:#000;
  color:white;
}
.item {
  padding:12px;
  border-bottom:1px solid #333;
}
.need { color:#22c55e }
.extra { color:#ef4444 }
.unknown { color:#f59e0b }
.covered { color:#60a5fa }
button {
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
}
.top {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.top button {
  flex:1;
  background:#444;
}
.confirm {
  background:#000;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Reward Picker</h2>

<div class="top">
  <button onclick="exportData()">Export</button>
  <button onclick="importData()">Import</button>
</div>

<input id="search" placeholder="type reward..." oninput="search()">

<div id="results"></div>
<div id="confirm"></div>

<h3>Recently chosen</h3>
<div id="recent"></div>

<script>

let db = JSON.parse(localStorage.getItem("wf_db")) || [];

let recent = JSON.parse(localStorage.getItem("wf_recent")) || [];

function save() {
  localStorage.setItem("wf_db", JSON.stringify(db));
  localStorage.setItem("wf_recent", JSON.stringify(recent));
}

function status(p){
  if(!p.need) return "UNKNOWN";
  if(p.have < p.need) return "NEED";
  if(p.have > p.need) return "EXTRA";
  return "COVERED";
}

function search(){
  let q = document.getElementById("search").value.toLowerCase();
  let out = "";

  db.forEach((item,i)=>{
    Object.keys(item.parts).forEach(part=>{
      let full = item.name + " " + part;

      if(full.toLowerCase().includes(q)){
        let p = item.parts[part];
        let s = status(p);

        out += `
        <div class="item">
          <b>${full}</b> - <span class="${s.toLowerCase()}">${s}</span>
          <button onclick="pick(${i},'${part}','${full}')">Check</button>
        </div>`;
      }
    });
  });

  document.getElementById("results").innerHTML = out;
}

let current = null;

function pick(i,part,label){
  current = {i,part,label};

  document.getElementById("confirm").innerHTML = `
    <div class="confirm">
      <b>${label}</b><br><br>
      <button onclick="confirmPick()">Choose this reward</button>
      <button onclick="cancel()">Not chosen</button>
    </div>`;
}

function confirmPick(){
  let p = db[current.i].parts[current.part];
  p.have++;

  recent.unshift(current.label);
  recent = recent.slice(0,10);

  save();
  cancel();
  search();
  renderRecent();
}

function cancel(){
  document.getElementById("confirm").innerHTML = "";
}

function renderRecent(){
  document.getElementById("recent").innerHTML =
    recent.map(r => `<div>${r}</div>`).join("");
}

function exportData(){
  let blob = new Blob([JSON.stringify(db)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "warframe_data.json";
  a.click();
}

function importData(){
  let input = document.createElement("input");
  input.type = "file";

  input.onchange = e => {
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = () => {
      db = JSON.parse(reader.result);
      save();
      alert("Imported!");
    };

    reader.readAsText(file);
  };

  input.click();
}

renderRecent();

</script>

</body>
</html>
