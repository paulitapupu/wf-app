<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF App Inventory</title>
<style>
body {background:#020617;color:white;font-family:Arial;padding:12px}
input {width:100%;padding:14px;font-size:16px;background:black;color:white;border-radius:10px}
button {width:100%;padding:12px;margin-top:6px;background:#2563eb;color:white;border:none;border-radius:10px;font-weight:bold}
.item {padding:10px;border-bottom:1px solid #333}
.need {color:#22c55e}
</style>
</head><body><h2>WF App Inventory</h2><input id="search" placeholder="type reward..." oninput="search()"><div id="results"></div><script>

// 🔥 SEEDED INVENTORY (sample from your data structure)
let db = JSON.parse(localStorage.getItem("wfdb") || JSON.stringify([
  {
    name:"Nekros Prime",
    parts:{
      "Blueprint":{need:1,have:1},
      "Neuroptics":{need:1,have:0},
      "Chassis":{need:1,have:0},
      "Systems":{need:1,have:1}
    }
  },
  {
    name:"Akarius Prime",
    parts:{
      "Blueprint":{need:1,have:1},
      "Receiver":{need:2,have:2},
      "Barrel":{need:2,have:1}
    }
  },
  {
    name:"Alternox Prime",
    parts:{
      "Blueprint":{need:1,have:0},
      "Barrel":{need:1,have:0},
      "Receiver":{need:1,have:0},
      "Stock":{need:1,have:0}
    }
  }
]))

function save() {
  localStorage.setItem("wfdb", JSON.stringify(db))
}

function search() {
  let q = document.getElementById("search").value.toLowerCase()
  let results = document.getElementById("results")
  
  if (!q) {
    results.innerHTML = ""
    return
  }

  let matches = []

  db.forEach((item,i)=>{
    Object.keys(item.parts).forEach(part=>{
      let label = item.name + " " + part
      if(label.toLowerCase().includes(q)){
        matches.push(label)
      }
    })
  })

  let exactExists = db.some(x => x.name.toLowerCase() === q)

  let html = matches.map(m=>`<div class="item">${m}</div>`).join("")

  if(!exactExists){
    html += `<button onclick="addItem('${q}')">Add "${q}"</button>`
  }

  results.innerHTML = html || `<button onclick="addItem('${q}')">Add "${q}"</button>`
}

function addItem(name){
  db.push({name:name, parts:{Blueprint:{need:1,have:0}}})
  save()
  alert("Added "+name)
}

</script></body>
</html>
