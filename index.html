<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF App v6</title>
<style>
body{background:#020617;color:white;font-family:Arial;padding:12px}
input{width:100%;padding:12px;margin-top:6px;background:#000;color:white;border:1px solid #333;border-radius:8px}
button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold}
.item{border-bottom:1px solid #333;padding:10px}
.need{color:#22c55e}.extra{color:#ef4444}.covered{color:#60a5fa}.unknown{color:#f59e0b}
.box{margin-top:10px;padding:10px;background:#000;border-radius:10px}
</style>
</head>
<body>

<h2>WF App v6</h2>

<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>

<input id="search" placeholder="type reward..." oninput="search()">

<div id="results"></div>
<div id="confirm"></div>
<div id="builder"></div>

<script>
let db = JSON.parse(localStorage.getItem("wf_db")||"[]")

function save(){localStorage.setItem("wf_db",JSON.stringify(db))}

function status(p){
 if(!p.need) return "UNKNOWN"
 if(p.have<p.need) return "NEED"
 if(p.have>p.need) return "EXTRA"
 return "COVERED"
}

function search(){
 let q=document.getElementById("search").value.toLowerCase()
 let out=""
 let found=false

 db.forEach((item,i)=>{
  Object.keys(item.parts).forEach(part=>{
   let name=item.name+" "+part
   if(name.toLowerCase().includes(q)){
    found=true
    let s=status(item.parts[part])
    out+=`<div class='item'><b>${name}</b> <span class='${s.toLowerCase()}'>${s}</span>
    <button onclick="pick(${i},'${part}','${name}')">Check</button></div>`
   }
  })
 })

 if(!found && q){
  out+=`<div class='box'>No results
  <button onclick="startBuilder('${q}')">Add item</button></div>`
 }

 document.getElementById("results").innerHTML=out
}

let current=null

function pick(i,p,n){
 current={i,p,n}
 document.getElementById("confirm").innerHTML=
 `<div class='box'><b>${n}</b>
 <button onclick="confirmPick()">Choose</button>
 <button onclick="cancel()">Cancel</button></div>`
}

function confirmPick(){
 db[current.i].parts[current.p].have++
 save()
 cancel()
 search()
}

function cancel(){document.getElementById("confirm").innerHTML=""}

// MULTI PART BUILDER
let parts=[]

function startBuilder(q){
 parts=[]
 renderBuilder(q)
}

function addRow(){
 parts.push({part:"",need:1,have:0,ducats:0})
 renderBuilder()
}

function updateRow(i,key,val){
 parts[i][key]=val
}

function removeRow(i){
 parts.splice(i,1)
 renderBuilder()
}

function renderBuilder(name=""){
 let html=`<div class='box'>
 Name<input id='itemName' value='${name||""}'>`

 parts.forEach((p,i)=>{
  html+=`
  <div>
   Part<input value='${p.part}' onchange="updateRow(${i},'part',this.value)">
   Need<input type='number' value='${p.need}' onchange="updateRow(${i},'need',this.value)">
   Have<input type='number' value='${p.have}' onchange="updateRow(${i},'have',this.value)">
   Ducats<input type='number' value='${p.ducats}' onchange="updateRow(${i},'ducats',this.value)">
   <button onclick="removeRow(${i})">Remove</button>
  </div>`
 })

 html+=`
 <button onclick="addRow()">Add Part</button>
 <button onclick="saveItem()">Save Item</button>
 </div>`

 document.getElementById("builder").innerHTML=html
}

function saveItem(){
 let name=document.getElementById("itemName").value
 let item={name,parts:{}}

 parts.forEach(p=>{
  if(p.part){
   item.parts[p.part]={need:+p.need||0,have:+p.have||0,ducats:+p.ducats||0}
  }
 })

 db.push(item)
 save()
 alert("Saved")
 document.getElementById("builder").innerHTML=""
 search()
}

function exportData(){
 let blob=new Blob([JSON.stringify(db)],{type:"application/json"})
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="wf.json"
 a.click()
}

function importData(){
 let i=document.createElement("input")
 i.type="file"
 i.onchange=e=>{
  let r=new FileReader()
  r.onload=()=>{db=JSON.parse(r.result);save();alert("Imported")}
  r.readAsText(e.target.files[0])
 }
 i.click()
}
</script>

</body>
</html>
