<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WF App</title>
<style>
body{background:#020617;color:white;font-family:Arial;padding:12px}
input,select{width:100%;padding:12px;margin-top:6px;background:black;color:white;border-radius:10px}
button{width:100%;padding:12px;margin-top:6px;background:#2563eb;color:white;border:none;border-radius:10px;font-weight:bold}
.item{padding:10px;border-bottom:1px solid #333}
</style>
</head>
<body>

<h2>WF App</h2>

<input id="search" placeholder="Search..." oninput="search()">
<div id="results"></div>
<div id="addFlow"></div>

<script>

let db = JSON.parse(localStorage.getItem("wfdb")||"[]")

function save(){localStorage.setItem("wfdb",JSON.stringify(db))}

function search(){
 let q=document.getElementById("search").value.toLowerCase()
 let out=""
 let exact=db.some(x=>x.name.toLowerCase()==q)

 db.forEach(item=>{
  if(item.name.toLowerCase().includes(q)){
    out+=`<div class="item">${item.name}</div>`
  }
 })

 if(!exact && q){
  out+=`<button onclick="startAdd('${q}')">Add "${q}"</button>`
 }

 document.getElementById("results").innerHTML=out
}

function startAdd(name){
 document.getElementById("addFlow").innerHTML=`
 <h3>Add Item</h3>
 Name<input id="name" value="${name}">
 Type<select id="type">
  <option>Frame</option>
  <option>Weapon</option>
 </select>
 <button onclick="next()">Next</button>`
}

let parts=[]

function next(){
 let type=document.getElementById("type").value
 parts=[]

 if(type=="Frame"){
  parts=[
   {name:"Blueprint",need:1,have:0},
   {name:"Neuroptics",need:1,have:0},
   {name:"Chassis",need:1,have:0},
   {name:"Systems",need:1,have:0}
  ]
 } else {
  parts=[{name:"",need:1,have:0}]
 }

 renderParts()
}

function renderParts(){
 let html=""
 parts.forEach((p,i)=>{
  html+=`
  <div>
   Part<input value="${p.name}" onchange="parts[${i}].name=this.value">
   Need<input type="number" value="${p.need}" onchange="parts[${i}].need=this.value">
   Have<input type="number" value="${p.have}" onchange="parts[${i}].have=this.value">
  </div>`
 })

 html+=`<button onclick="addRow()">Add Part</button>
 <button onclick="saveItem()">Save</button>`

 document.getElementById("addFlow").innerHTML=html
}

function addRow(){
 parts.push({name:"",need:1,have:0})
 renderParts()
}

function saveItem(){
 let name=document.getElementById("name").value
 let item={name,parts:{}}
 parts.forEach(p=>{
  if(p.name){
    item.parts[p.name]={need:p.need,have:p.have}
  }
 })
 db.push(item)
 save()
 alert("Saved")
 document.getElementById("addFlow").innerHTML=""
}

</script>

</body>
</html>
