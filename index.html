function save(){ localStorage.setItem("wfdb_inventory", JSON.stringify(db)); }

function normalize(s){
  return String(s||"").toLowerCase()
    .replace(/blueprint/g,"bp")
    .replace(/receiver/g,"rec")
    .replace(/barrel/g,"barr")
    .replace(/systems/g,"sys")
    .replace(/neuroptics/g,"neuro")
    .replace(/\s+/g," ")
    .trim();
}

function status(part){
 let need=Number(part.need||0), have=Number(part.have||0);
 if(!need) return "UNKNOWN";
 if(have<need) return "NEED";
 if(have>need) return "EXTRA";
 return "COVERED";
}

function esc(s){
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

function searchItems(){
 let q=document.getElementById("search").value;
 let nq=normalize(q);
 let out="";
 let exact=db.some(x=>normalize(x.name)===nq);
 let matches=[];

 if(!q.trim()) {
   document.getElementById("results").innerHTML="";
   return;
 }

 db.forEach((item, idx)=>{
   let itemHit = normalize(item.name).includes(nq);
   Object.keys(item.parts||{}).forEach(part=>{
     let label=item.name+" "+part;
     let fullNorm=normalize(label);
     if(itemHit || fullNorm.includes(nq)){
       matches.push({idx, part, label, data:item.parts[part]});
     }
   });
 });

 matches.sort((a,b)=>{
   const rank = s => s==="NEED"?0:s==="UNKNOWN"?1:s==="COVERED"?2:3;
   return rank(status(a.data))-rank(status(b.data)) || a.label.localeCompare(b.label);
 });

 if(matches.length){
   out += matches.map(m=>`<div class="item">
      <div><b>${esc(m.label)}</b> <span class="${status(m.data).toLowerCase()}">${status(m.data)}</span></div>
      <div class="meta">Have ${m.data.have||0} / Need ${m.data.need||0} · Ducats ${m.data.ducats||0}</div>
   </div>`).join("");
 }

 if(!exact && q.trim()){
   out += `<button onclick="startAdd(document.getElementById('search').value)">Add "${esc(q)}"</button>`;
 }

 document.getElementById("results").innerHTML=out;
}

function startAdd(name){
 document.getElementById("addFlow").innerHTML=`
 <div class="box">
 <h3>Add Item</h3>
 Name<input id="name" value="${esc(name)}">
 Type<select id="type">
  <option>Frame</option>
  <option>Weapon</option>
 </select>
 <button onclick="nextAdd()">Next</button>
 </div>`;
}

let parts=[];

function nextAdd(){
 let type=document.getElementById("type").value;
 parts=[];

 if(type==="Frame"){
  parts=[
   {name:"Blueprint",need:1,have:0,ducats:15},
   {name:"Neuroptics",need:1,have:0,ducats:45},
   {name:"Chassis",need:1,have:0,ducats:45},
   {name:"Systems",need:1,have:0,ducats:100}
  ];
 } else {
  parts=[{name:"",need:1,have:0,ducats:0}];
 }

 renderParts();
}

function renderParts(){
 let html="";
 parts.forEach((p,i)=>{
  html+=`
   <div class="box">
    Part<input value="${esc(p.name)}" onchange="parts[${i}].name=this.value">
    Need<input type="number" value="${p.need}" onchange="parts[${i}].need=Number(this.value||0)">
    Have<input type="number" value="${p.have}" onchange="parts[${i}].have=Number(this.value||0)">
    Ducats<input type="number" value="${p.ducats}" onchange="parts[${i}].ducats=Number(this.value||0)">
   </div>`;
 });

 html += `<button onclick="addRow()">Add Part</button>
 <button onclick="saveItem()">Save</button>`;

 document.getElementById("addFlow").innerHTML=html;
}

function addRow(){
 parts.push({name:"",need:1,have:0,ducats:0});
 renderParts();
}

function saveItem(){
 let nameEl=document.getElementById("name");
 let name=nameEl ? nameEl.value : document.getElementById("search").value;
 if(!name.trim()){
   alert("Please enter an item name.");
   return;
 }

 let existing=db.find(x=>normalize(x.name)===normalize(name));
 let item=existing || {name:name,parts:{}};

 parts.forEach(p=>{
  if(p.name && p.name.trim()){
    item.parts[p.name]={
      need:Number(p.need||0),
      have:Number(p.have||0),
      ducats:Number(p.ducats||0)
    };
  }
 });

 if(!existing) db.push(item);
 save();
 alert("Saved");
 document.getElementById("addFlow").innerHTML="";
 document.getElementById("search").value=name;
 searchItems();
}
</script>
